<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kroger API Test</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      padding: 32px;
      margin-bottom: 20px;
    }
    h1 {
      margin-top: 0;
      color: #6366f1;
    }
    button {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button:hover {
      background: #5558e3;
    }
    .success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid #34d399;
      color: #34d399;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }
    pre {
      background: #0f172a;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛒 Kroger API Test</h1>
    <p>Test your Kroger API credentials</p>

    <div>
      <button onclick="testConfig()">1. Test Config</button>
      <button onclick="testOAuth()">2. Connect Kroger</button>
      <button onclick="testProfile()">3. Get Profile</button>
      <button onclick="testStore()">4. Get Store</button>
      <button onclick="testProducts()">5. Search Products</button>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="output"></div>
  </div>

  <script type="module">
    import {
      isAuthenticated,
      initiateOAuth,
      clearTokens,
      getUserProfile,
      getUserDefaultStore,
      searchProducts
    } from './src/kroger.js';

    window.testConfig = () => {
      const clientId = import.meta.env.VITE_KROGER_CLIENT_ID;
      const hasCredentials = !!clientId && clientId !== 'your_client_id_here';

      showOutput(
        hasCredentials ? 'success' : 'error',
        hasCredentials
          ? `✓ Credentials found in .env\nClient ID: ${clientId.substring(0, 10)}...`
          : '✗ No credentials found. Add them to .env file'
      );
    };

    window.testOAuth = () => {
      try {
        initiateOAuth();
      } catch (error) {
        showOutput('error', `Failed to initiate OAuth: ${error.message}`);
      }
    };

    window.testProfile = async () => {
      try {
        if (!isAuthenticated()) {
          showOutput('error', 'Not authenticated. Click "Connect Kroger" first.');
          return;
        }

        const profile = await getUserProfile();
        showOutput('success', `Profile loaded:\n${JSON.stringify(profile.data, null, 2)}`);
      } catch (error) {
        showOutput('error', `Failed to get profile: ${error.message}`);
      }
    };

    window.testStore = async () => {
      try {
        if (!isAuthenticated()) {
          showOutput('error', 'Not authenticated. Click "Connect Kroger" first.');
          return;
        }

        const store = await getUserDefaultStore();
        showOutput('success', `Store found:\n${store.name}\n${store.address.addressLine1}\n${store.address.city}, ${store.address.state}`);
      } catch (error) {
        showOutput('error', `Failed to get store: ${error.message}`);
      }
    };

    window.testProducts = async () => {
      try {
        if (!isAuthenticated()) {
          showOutput('error', 'Not authenticated. Click "Connect Kroger" first.');
          return;
        }

        const store = await getUserDefaultStore();
        const products = await searchProducts('chicken breast', store.locationId, 5);

        showOutput('success', `Found ${products.length} products:\n${JSON.stringify(products.slice(0, 2), null, 2)}`);
      } catch (error) {
        showOutput('error', `Failed to search products: ${error.message}`);
      }
    };

    window.logout = () => {
      clearTokens();
      showOutput('success', 'Logged out successfully');
    };

    function showOutput(type, message) {
      const output = document.getElementById('output');
      output.className = type;
      output.innerHTML = `<pre>${message}</pre>`;
    }

    // Check auth status on load
    if (isAuthenticated()) {
      showOutput('success', '✓ Already authenticated with Kroger');
    } else {
      showOutput('error', 'Not authenticated. Click "Connect Kroger" to begin.');
    }
  </script>
</body>
</html>
