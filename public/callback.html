<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kroger OAuth Callback</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      padding: 40px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .success {
      color: #34d399;
      font-size: 64px;
      margin-bottom: 20px;
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
    }
    button {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #5558e3;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h2>Connecting to Kroger...</h2>
      <p>Please wait while we complete the authentication.</p>
    </div>

    <div id="success" style="display: none;">
      <div class="success">✓</div>
      <h2>Successfully Connected!</h2>
      <p>Your Kroger account has been linked.</p>
      <button onclick="goToTest()">Continue to Test Page</button>
    </div>

    <div id="error" style="display: none;">
      <h2>Connection Failed</h2>
      <div class="error">
        <p id="errorMessage"></p>
      </div>
      <button onclick="goToTest()">Back to Test Page</button>
    </div>
  </div>

  <script type="module">
    import { handleOAuthCallback } from '../src/kroger.js';

    async function processCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      // Check for OAuth error
      if (error) {
        showError(`OAuth error: ${error}`);
        return;
      }

      // Check for missing parameters
      if (!code || !state) {
        showError('Missing authorization code or state parameter');
        return;
      }

      try {
        // Exchange code for token
        await handleOAuthCallback(code, state);

        // Show success
        showSuccess();

        // Redirect to test page after 2 seconds
        setTimeout(() => {
          window.location.href = '/meal-planner/kroger-test.html';
        }, 2000);

      } catch (error) {
        console.error('OAuth callback error:', error);
        showError(error.message);
      }
    }

    function showSuccess() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('errorMessage').textContent = message;
    }

    window.goToTest = () => {
      window.location.href = '/meal-planner/kroger-test.html';
    };

    // Start processing on page load
    processCallback();
  </script>
</body>
</html>
